  <path d="M958 270 l-14 -18 h28z" fill="#fff7e8"/>
  <g transform="translate(455 310)">
    <rect width="112" height="112" rx="12" fill="#fffaf0" stroke="#4e3b29" stroke-width="3"/>
    <circle cx="56" cy="56" r="12" fill="#2a2118"/>
  </g>
  <g transform="translate(610 310)">
    <rect width="112" height="112" rx="12" fill="#fffaf0" stroke="#4e3b29" stroke-width="3"/>
    <circle cx="34" cy="34" r="11" fill="#2a2118"/><circle cx="78" cy="78" r="11" fill="#2a2118"/>
  </g>
  <g transform="translate(765 310)">
    <rect width="112" height="112" rx="12" fill="#fffaf0" stroke="#4e3b29" stroke-width="3"/>
    <circle cx="34" cy="34" r="11" fill="#2a2118"/><circle cx="56" cy="56" r="11" fill="#2a2118"/><circle cx="78" cy="78" r="11" fill="#2a2118"/>
  </g>
  <g transform="translate(920 310)">
    <rect width="112" height="112" rx="12" fill="#fffaf0" stroke="#4e3b29" stroke-width="3"/>
    <circle cx="34" cy="34" r="11" fill="#2a2118"/><circle cx="78" cy="34" r="11" fill="#2a2118"/><circle cx="34" cy="78" r="11" fill="#2a2118"/><circle cx="78" cy="78" r="11" fill="#2a2118"/>
  </g>
  <g transform="translate(1075 310)">
    <rect width="112" height="112" rx="12" fill="#fffaf0" stroke="#4e3b29" stroke-width="3"/>
    <circle cx="34" cy="34" r="11" fill="#2a2118"/><circle cx="78" cy="34" r="11" fill="#2a2118"/><circle cx="56" cy="56" r="11" fill="#2a2118"/><circle cx="34" cy="78" r="11" fill="#2a2118"/><circle cx="78" cy="78" r="11" fill="#2a2118"/>
  </g>
  <g transform="translate(1230 310)">
    <rect width="112" height="112" rx="12" fill="#fffaf0" stroke="#4e3b29" stroke-width="3"/>
    <circle cx="34" cy="28" r="10" fill="#2a2118"/><circle cx="34" cy="56" r="10" fill="#2a2118"/><circle cx="34" cy="84" r="10" fill="#2a2118"/><circle cx="78" cy="28" r="10" fill="#2a2118"/><circle cx="78" cy="56" r="10" fill="#2a2118"/><circle cx="78" cy="84" r="10" fill="#2a2118"/>
  </g>
  <path d="M950 500 l0 62" stroke="#f7ead0" stroke-width="16"/>
  <path d="M950 562 l-28 -34 h56z" fill="#f7ead0"/>
  <rect x="360" y="590" width="1030" height="255" rx="12" fill="#fff7e8" stroke="#715c3e" stroke-width="3"/>
  <text x="810" y="650" class="label h1">结果判断</text>
  <rect x="400" y="690" width="300" height="118" rx="10" fill="#fffaf0" stroke="#d2bd94" stroke-width="2"/>
