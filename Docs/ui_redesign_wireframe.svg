  <text x="1532" y="770" class="muted body">六同 五同 四同</text>
  <text x="1532" y="815" class="muted body">顺子 三同</text>
  <text x="1532" y="860" class="muted body">全奇 全偶</text>

  <!-- Bottom action bar -->
  <rect x="0" y="934" width="1920" height="146" fill="#ead9b8"/>
  <rect x="330" y="956" width="1440" height="96" rx="12" class="panel"/>
  <text x="54" y="1014" class="label">行动条</text>
  <path d="M158 1000 L260 1000" stroke="#0f6f6c" stroke-width="8"/>
  <path d="M260 1000 l-18 -14 v28z" fill="#0f6f6c"/>
  <rect x="500" y="970" width="560" height="66" rx="8" fill="#177b75" stroke="#5e4a32" stroke-width="3"/>
  <text x="675" y="1016" fill="#fff7e8" font-size="38" font-weight="800" font-family="Microsoft YaHei, Noto Sans CJK SC, Arial, sans-serif">直接结算</text>
  <rect x="1190" y="970" width="260" height="66" rx="8" class="panel-soft"/>
  <text x="1284" y="1016" class="ink h2">出千</text>
  <rect x="1500" y="970" width="220" height="66" rx="8" class="panel-soft"/>
  <text x="1574" y="1016" class="ink h2">取消</text>
  <text x="420" y="930" class="muted small">核心原则：中央判断结果，底部只放下一步行动；右侧做参考，左侧做构筑。</text>
</svg>
