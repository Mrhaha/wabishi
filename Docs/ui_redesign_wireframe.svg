  <text x="40" y="108" class="label">HUD</text>
  <path d="M150 88 L198 88" stroke="#0f6f6c" stroke-width="8"/>
  <path d="M198 88 l-18 -14 v28z" fill="#0f6f6c"/>
  <text x="260" y="70" class="ink h3">目标进度</text>
  <rect x="260" y="92" width="640" height="20" rx="10" fill="#d8c6a5"/>
  <rect x="260" y="92" width="360" height="20" rx="10" class="gold"/>
  <circle cx="260" cy="102" r="20" class="gold"/>
  <circle cx="500" cy="102" r="20" class="gold"/>
  <circle cx="620" cy="102" r="28" class="gold"/>
  <circle cx="905" cy="102" r="18" fill="#f8f0dd" stroke="#9a8462" stroke-width="3"/>
  <line x1="990" y1="24" x2="990" y2="144" class="hard-line"/>
  <text x="1040" y="74" class="ink h3">金币</text>
  <text x="1040" y="118" class="ink h2">125</text>
  <line x1="1230" y1="24" x2="1230" y2="144" class="hard-line"/>
  <text x="1278" y="74" class="ink h3">出手</text>
  <text x="1278" y="118" class="ink h2">2 / 3</text>
  <line x1="1492" y1="24" x2="1492" y2="144" class="hard-line"/>
  <text x="1542" y="74" class="ink h3">出千</text>
  <text x="1542" y="118" class="ink h2">1 / 1</text>

  <!-- Left dice bag summary -->
  <rect x="50" y="185" width="240" height="725" rx="14" class="panel"/>
  <text x="82" y="235" class="ink h2">骰袋摘要</text>
  <text x="82" y="280" class="muted body">容量 6 / 6</text>
  <rect x="82" y="318" width="156" height="46" rx="8" class="panel-soft"/>
  <text x="106" y="350" class="ink h3">偶数路线</text>
  <rect x="82" y="380" width="156" height="46" rx="8" class="panel-soft"/>
  <text x="106" y="412" class="ink h3">成长 x1</text>
  <rect x="82" y="442" width="156" height="46" rx="8" class="panel-soft"/>
  <text x="106" y="474" class="ink h3">锁定 x1</text>
  <text x="82" y="548" class="muted small">骰袋详情不常驻</text>
  <text x="82" y="584" class="muted small">只在市场 / 出千展开</text>
  <rect x="82" y="630" width="176" height="150" rx="8" class="soft-line"/>
  <text x="110" y="690" class="muted body">关键提醒</text>
  <text x="110" y="734" class="gold body">大树成长 2</text>

