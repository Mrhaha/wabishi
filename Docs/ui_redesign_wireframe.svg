<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <style>
      .bg { fill: #f5ead3; }
      .ink { fill: #2a2118; font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; }
      .muted { fill: #776956; font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; }
      .teal { fill: #0f6f6c; }
      .gold { fill: #d6a02f; }
      .panel { fill: #fff7e8; stroke: #7f6b4e; stroke-width: 3; }
      .panel-soft { fill: #f3e2bf; stroke: #9a8462; stroke-width: 2; }
      .table { fill: #1f7773; stroke: #5e4a32; stroke-width: 4; }
      .table-inner { fill: #2d8a84; opacity: .38; }
      .soft-line { stroke: #b49d78; stroke-width: 2; stroke-dasharray: 10 8; fill: none; }
      .hard-line { stroke: #7f6b4e; stroke-width: 3; fill: none; }
      .label { fill: #0f6f6c; font-size: 34px; font-weight: 700; font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; }
      .small { font-size: 24px; }
      .body { font-size: 28px; }
      .h1 { font-size: 44px; font-weight: 800; }
      .h2 { font-size: 34px; font-weight: 800; }
      .h3 { font-size: 28px; font-weight: 700; }
      .num { font-size: 72px; font-weight: 900; }
    </style>
  </defs>

  <rect class="bg" width="1920" height="1080"/>
  <rect x="0" y="0" width="1920" height="1080" fill="#fff9ef" opacity=".35"/>

  <!-- Top HUD -->
  <rect x="210" y="24" width="1530" height="120" rx="12" class="panel"/>
