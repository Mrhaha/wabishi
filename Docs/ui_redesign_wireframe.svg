  <text x="450" y="782" class="ink h2">顺子 x2</text>
  <rect x="735" y="690" width="300" height="118" rx="10" fill="#fffaf0" stroke="#d2bd94" stroke-width="2"/>
  <text x="792" y="735" class="ink h3">本次得分</text>
  <text x="800" y="794" class="teal num">+150</text>
  <rect x="1070" y="690" width="300" height="118" rx="10" fill="#fffaf0" stroke="#d2bd94" stroke-width="2"/>
  <text x="1120" y="735" class="ink h3">距离目标</text>
  <rect x="1120" y="760" width="220" height="18" rx="9" fill="#d8c6a5"/>
  <rect x="1120" y="760" width="120" height="18" rx="9" class="gold"/>
  <text x="1160" y="815" class="ink h3">150 / 300</text>

  <!-- Right secondary panels -->
  <rect x="1460" y="185" width="410" height="725" rx="14" class="panel"/>
  <rect x="1495" y="230" width="340" height="150" rx="10" class="soft-line"/>
  <text x="1545" y="288" class="ink h3">本关规则</text>
  <text x="1532" y="332" class="muted body">偶数 +1，奇数 -1</text>
  <rect x="1495" y="420" width="340" height="205" rx="10" class="panel-soft"/>
  <text x="1532" y="476" class="ink h3">最近事件</text>
  <text x="1532" y="524" class="muted body">达成顺子  +150</text>
  <text x="1532" y="568" class="muted body">猪猪命中  +1 金</text>
  <text x="1532" y="612" class="muted body">大树成长  +1</text>
  <rect x="1495" y="665" width="340" height="220" rx="10" class="panel-soft"/>
