<script>
(() => {
  const duration = 4.8;
  const targetScore = 22;
  const slotCenters = [448, 640, 832, 1024, 1216, 1408];
  const slotY = 552;
  const dieSize = 192;
  const reelSequence = [1, 4, 2, 6, 3, 5];
  const diceData = [
    { family: 'pig', core: 'three_little_pigs', value: 4 },
    { family: 'neutral', core: 'duet', value: 3 },
    { family: 'turtle', core: 'lucky_turtle', value: 6 },
    { family: 'devil', core: 'devourer', value: 5 },
    { family: 'pirate', core: 'pirate_king', value: 8 },
    { family: 'neutral', core: 'crown', value: 12 }
  ];
  const clamp = (v, a = 0, b = 1) => Math.max(a, Math.min(b, v));
  const lerp = (a, b, p) => a + (b - a) * p;
  const smooth = (a, b, v) => {
    const x = clamp((v - a) / Math.max(.00001, b - a));
    return x * x * (3 - 2 * x);
  };
  const easeOutCubic = p => 1 - Math.pow(1 - clamp(p), 3);
  const pulse = (x, width) => {
    const p = clamp(1 - Math.abs(x) / width);
    return p * p;
  };
  const envelope = (t, start, rise, fall, end) => clamp(smooth(start, rise, t) * (1 - smooth(fall, end, t)));
  const $ = id => document.getElementById(id);
  const els = {
    world: $('world'), diceLayer: $('diceLayer'), focusLayer: $('focusLayer'), packetLayer: $('packetLayer'),
    phaseCode: $('phaseCode'), currentValue: $('currentValue'), targetValue: $('targetValue'),
    actionText: $('actionText'), actionGlow: $('actionGlow'), ruleHeading: $('ruleHeading'), ruleBody: $('ruleBody'),
    terminalResult: $('terminalResult'), resultWarmth: $('resultWarmth'), terminalWave: $('terminalWave'),
    towerFx: $('towerFx'), towerLamps: $('towerLamps'), towerBloom: $('towerBloom'),
    targetLatch: $('targetLatch'), towerCriticalCore: $('towerCriticalCore'), criticalBurst: $('criticalBurst'),
    criticalStrobe: $('criticalStrobe'), intakeFlash: $('intakeFlash'),
    impactRing: $('impactRing'), towerBrownout: $('towerBrownout'), crtTear: $('crtTear'),
    sparkLayer: $('sparkLayer'), globalDim: $('globalDim'), scanA: $('scanA'), scanB: $('scanB'), scanC: $('scanC')
  };

  function perimeterPoints(width, height, count, inset = 8) {
    const w = width - inset * 2;
    const h = height - inset * 2;
    const perimeter = 2 * (w + h);
    const points = [];
    for (let i = 0; i < count; i += 1) {
      let d = i / count * perimeter;
      let x;
      let y;
      if (d < w) { x = inset + d; y = inset; }
      else if ((d -= w) < h) { x = inset + w; y = inset + d; }
      else if ((d -= h) < w) { x = inset + w - d; y = inset + h; }
      else { d -= w; x = inset; y = inset + h - d; }
      points.push([x - 4, y - 4]);
    }
    return points;
  }

  function buildDice() {
    diceData.forEach((data, index) => {
      const die = document.createElement('div');
      die.className = 'die';
      die.style.left = `${slotCenters[index] - dieSize / 2}px`;
      die.style.top = `${slotY - dieSize / 2}px`;

      const shell = document.createElement('img');
      shell.className = 'die-shell';
      shell.src = `../../../../Resources/Art/MainGame/arcade_main_game_die_shell_${data.family}.png`;
      die.appendChild(shell);

      const face = document.createElement('div');
      face.className = 'face-window';
      for (let i = 0; i < 3; i += 1) {
        const digit = document.createElement('div');
        digit.className = 'reel-digit';
        face.appendChild(digit);
      }
      die.appendChild(face);

      const core = document.createElement('img');
      core.className = 'type-core';
      core.src = `../../../../Resources/Art/DiceTypes/arcade_type_core_${data.core}.png`;
      die.appendChild(core);

      const stopFlash = document.createElement('div');
      stopFlash.className = 'stop-flash';
      die.appendChild(stopFlash);

      els.diceLayer.appendChild(die);
      data.el = die;
      data.face = face;
      data.digits = [...face.children];
      data.coreEl = core;
      data.stopFlash = stopFlash;
    });
  }

  function buildTower() {
    for (let i = 0; i < 13; i += 1) {
      const lamp = document.createElement('i');
      lamp.className = 'tower-lamp';
      lamp.dataset.index = String(i);
      lamp.style.bottom = `${i * 21}px`;
      els.towerLamps.appendChild(lamp);
    }
  }

  function buildWave() {
    const cols = 27;
    const rows = 14;
    for (let x = 0; x < cols; x += 1) {
      for (let y = 0; y < rows; y += 1) {
        const dot = document.createElement('i');
        dot.className = 'wave-dot';
        dot.dataset.x = String(x);
        dot.dataset.y = String(y);
        dot.style.left = `${x * 6.5}px`;
        dot.style.top = `${y * 11.2}px`;
        els.terminalWave.appendChild(dot);
      }
    }
  }

  function buildSparks() {
    const specs = [
      [118, 112, -58], [162, 94, -22], [183, 139, 27], [151, 513, 18],
      [102, 498, 144], [174, 529, 61], [77, 536, 171], [192, 473, -13]
    ];
    specs.forEach(([x, y, angle], index) => {
      const spark = document.createElement('i');
      spark.className = 'spark';
      spark.dataset.index = String(index);
      spark.dataset.angle = String(angle);
      spark.style.left = `${x}px`;
      spark.style.top = `${y}px`;
      els.sparkLayer.appendChild(spark);
    });
  }

  function buildChaser(event) {
    const chaser = document.createElement('div');
    chaser.className = `chaser${event.echo ? ' echo' : ''}`;
    chaser.style.left = `${slotCenters[event.slot] - 101}px`;
    chaser.style.top = `${slotY - 105}px`;
    perimeterPoints(202, 210, 44, event.echo ? 12 : 8).forEach(([x, y], index) => {
      const bulb = document.createElement('i');
      bulb.className = 'chaser-bulb';
      bulb.dataset.index = String(index);
      bulb.style.left = `${x}px`;
      bulb.style.top = `${y}px`;
      chaser.appendChild(bulb);
    });
    els.focusLayer.appendChild(chaser);
    event.chaser = chaser;

    const source = document.createElement('div');
    source.className = `source-pulse${event.echo ? ' echo' : ''}`;
    source.style.left = `${slotCenters[event.slot] - 31}px`;
    source.style.top = `${slotY - 31}px`;
    els.packetLayer.appendChild(source);
    event.source = source;

    const packet = document.createElement('div');
    packet.className = `score-packet${event.echo ? ' echo' : ''}`;
    const count = Math.round(7 + event.weight * 16);
    const pipSize = 7 + event.weight * 4;
    for (let i = 0; i < count; i += 1) {
      const pip = document.createElement('i');
      const isCore = i < Math.max(1, Math.round(event.weight * 4));
      pip.className = `score-pip${isCore ? ' core' : ''}`;
      const column = (i * 5 + event.slot * 2 + (event.echo ? 3 : 0)) % 6;
      const row = (i * 3 + Math.floor(i / 5) + event.slot) % 5;
      const jitterX = ((i * 7 + event.slot * 3) % 7) - 3;
      const jitterY = ((i * 11 + event.slot) % 7) - 3;
      pip.style.width = `${pipSize}px`;
      pip.style.height = `${pipSize}px`;
      pip.style.left = `${column * 11 + jitterX}px`;
      pip.style.top = `${row * 11 + jitterY}px`;
      packet.appendChild(pip);
    }
    els.packetLayer.appendChild(packet);
    event.packet = packet;
  }

  const events = [
    { slot: 0, start: 1.42, rise: 1.46, fall: 1.72, end: 1.82, travelStart: 1.51, impact: 1.70, weight: .32, delta: 4 },
    { slot: 1, start: 1.68, rise: 1.72, fall: 2.18, end: 2.28, travelStart: 1.78, impact: 1.96, weight: .26, delta: 3, hold: true },
    { slot: 0, start: 1.95, rise: 1.99, fall: 2.20, end: 2.27, travelStart: 2.03, impact: 2.20, weight: .50, delta: 6, echo: true },
    { slot: 2, start: 2.24, rise: 2.28, fall: 2.50, end: 2.58, travelStart: 2.33, impact: 2.49, weight: .43, delta: 6 },
    { slot: 3, start: 2.51, rise: 2.55, fall: 2.80, end: 2.88, travelStart: 2.62, impact: 2.78, weight: .48, delta: 5, targetCross: true },
    { slot: 4, start: 2.79, rise: 2.83, fall: 3.10, end: 3.18, travelStart: 2.91, impact: 3.08, weight: .70, delta: 8 },
    { slot: 5, start: 3.06, rise: 3.11, fall: 3.45, end: 3.55, travelStart: 3.20, impact: 3.43, weight: 1.00, delta: 12 }
  ];

  buildDice();
  buildTower();
  buildWave();
  buildSparks();
  events.forEach(buildChaser);

  function renderReel(data, index, t) {
    const rollStart = .08;
    const revealStart = .64 + index * .06;
    const revealEnd = revealStart + .25;
    const readyToRoll = smooth(.055, .14, t);
    const coreSize = lerp(86, 44, readyToRoll);
    data.coreEl.style.width = `${coreSize}px`;
    data.coreEl.style.height = `${coreSize}px`;
    data.coreEl.style.left = `${96 - coreSize / 2}px`;
    data.coreEl.style.top = `${lerp(48, 134, readyToRoll)}px`;
    data.coreEl.style.opacity = String(.94 - readyToRoll * .16);

    const stopFlash = pulse(t - revealEnd, .075);
    data.stopFlash.style.opacity = String(stopFlash * .86);
    data.stopFlash.style.transform = `scale(${1 + stopFlash * .025})`;

    if (t < rollStart) {
      data.digits.forEach(digit => { digit.style.opacity = '0'; });
      return;
    }

    if (t < revealStart) {
      const slow = smooth(.48, revealStart, t);
      const phase = (t - rollStart) * (20.5 - slow * 6.5) + index * .77 + slow * 1.8;
      const whole = Math.floor(phase);
      const fraction = phase - whole;
      const motionBlur = 1.25 - slow * .88;
      data.digits.forEach((digit, cell) => {
        const relative = cell - 1;
        const valueIndex = ((whole + relative + index * 2) % reelSequence.length + reelSequence.length) % reelSequence.length;
        digit.textContent = String(reelSequence[valueIndex]);
        const y = (relative + fraction) * 120;
        digit.style.transform = `translateY(${y}px)`;
        digit.style.opacity = String(.82 - Math.abs(relative + fraction) * .16);
        digit.style.filter = `blur(${motionBlur}px)`;
      });
      return;
    }

    const p = clamp((t - revealStart) / (revealEnd - revealStart));
    let finalY;
    if (p < .72) finalY = lerp(-120, 7, easeOutCubic(p / .72));
    else finalY = lerp(7, 0, smooth(.72, 1, p));
    data.digits[0].textContent = String(reelSequence[(index + 2) % reelSequence.length]);
    data.digits[0].style.transform = `translateY(${finalY + 120}px)`;
    data.digits[0].style.opacity = String(1 - smooth(.45, .92, p));
    data.digits[0].style.filter = `blur(${lerp(.65, 0, p)}px)`;
    data.digits[1].textContent = String(data.value);
    data.digits[1].style.transform = `translateY(${finalY}px)`;
    data.digits[1].style.opacity = '1';
    data.digits[1].style.filter = `blur(${lerp(.55, 0, p)}px)`;
    data.digits[2].textContent = String(reelSequence[(index + 5) % reelSequence.length]);
    data.digits[2].style.transform = `translateY(${finalY - 120}px)`;
    data.digits[2].style.opacity = String(1 - smooth(.1, .62, p));
    data.digits[2].style.filter = `blur(${lerp(.65, 0, p)}px)`;
  }

  function renderChaser(event, t) {
    const activity = envelope(t, event.start, event.rise, event.fall, event.end);
    event.chaser.style.opacity = String(activity * (event.echo ? .82 : 1));
    const bulbs = [...event.chaser.children];
    const direction = event.echo ? -1 : 1;
    const runner = ((t * 54 * direction + event.slot * 9) % bulbs.length + bulbs.length) % bulbs.length;
    bulbs.forEach((bulb, index) => {
      const raw = Math.abs(index - runner);
      const distance = Math.min(raw, bulbs.length - raw);
      const hot = clamp(1 - distance / (event.echo ? 3.4 : 5.2));
      const alpha = activity * (.14 + hot * .86);
      const white = event.weight > .74 && hot > .68 ? clamp((hot - .68) / .32) : 0;
      bulb.style.background = white > 0
        ? `rgb(255, ${Math.round(191 + white * 54)}, ${Math.round(71 + white * 150)})`
        : (event.echo ? '#d98d2a' : '#f1a02d');
      bulb.style.opacity = String(alpha);
      bulb.style.boxShadow = alpha > .18 ? `0 0 ${3 + hot * 7}px rgba(255, 151, 28, ${.30 + hot * .48})` : 'none';
      bulb.style.transform = `scale(${.82 + hot * .30})`;
    });
  }

  function renderPacket(event, t) {
    const condense = envelope(t, event.travelStart - .085, event.travelStart - .035, event.travelStart + .01, event.travelStart + .075);
    event.source.style.opacity = String(condense * (.64 + event.weight * .28));
    event.source.style.transform = `scale(${.34 + condense * (.54 + event.weight * .18)}) rotate(${(t - event.travelStart) * (event.echo ? -210 : 170)}deg)`;

    const p = smooth(event.travelStart, event.impact, t);
    const appearing = smooth(event.travelStart - .012, event.travelStart + .035, t);
    const vanishing = 1 - smooth(event.impact - .018, event.impact + .055, t);
    const opacity = clamp(appearing * vanishing);
    const startX = slotCenters[event.slot] - 39;
    const startY = slotY - 34;
    const endX = 171;
    const endY = 630;
    const x = lerp(startX, endX, p);
    const lift = 58 + Math.abs(startX - endX) * .035 + event.weight * 20;
    const y = lerp(startY, endY, p) - Math.sin(Math.PI * p) * lift;
    const scale = .32 + event.weight * .48 + Math.sin(Math.PI * p) * .12;
    event.packet.style.opacity = String(opacity);
    event.packet.style.transform = `translate(${x}px, ${y}px) scale(${scale}) rotate(${lerp(0, event.echo ? -28 : 22, p)}deg)`;
    [...event.packet.children].forEach((pip, index) => {
      const stagger = .74 + .26 * Math.sin((index + 1) * 2.1 + p * 10.5);
      pip.style.opacity = String(opacity * stagger * (event.echo ? .84 : 1));
    });
  }

  function scoreAt(t) {
    return events.reduce((score, event) => score + event.delta * smooth(event.impact - .015, event.impact + .085, t), 0);
  }

  function impactEnergyAt(t) {
    return events.reduce((energy, event) => Math.max(energy, pulse(t - event.impact, .075) * (.34 + event.weight * .66)), 0);
  }

  function renderTower(t) {
    const score = scoreAt(t);
    const fill = clamp(score / targetScore) * 13;
    const overload = clamp((score / targetScore - 1) / 1.05);
    const impactEnergy = impactEnergyAt(t);
    const brownout = envelope(t, 3.615, 3.655, 3.690, 3.750);
    const critical = pulse(t - 3.785, .145);
    const criticalAfter = envelope(t, 3.735, 3.785, 4.02, 4.24);
    const coolingWindow = t >= 3.82 ? 1 - smooth(3.82, 4.18, t) : 0;
    const coolingFlicker = coolingWindow * (.5 + .5 * Math.sin((t - 3.82) * Math.PI * 19));
    const targetCross = smooth(2.812, 2.882, t);
    const result = smooth(4.07, 4.22, t);

    [...els.towerLamps.children].forEach((lamp, index) => {
      const on = clamp(fill - index);
      const hot = clamp(overload * (.36 + index / 12 * .70) + critical * (.42 + index / 12 * .58));
      const intensity = clamp(on * (1 - brownout * .88) + critical * .32);
      const warm = hot > .42
        ? `rgba(255, ${Math.round(183 + hot * 66)}, ${Math.round(58 + hot * 178)}, .98)`
        : 'rgba(249, 156, 35, .96)';
      lamp.style.opacity = String(.48 + intensity * .52);
      lamp.style.borderColor = `rgba(187, 102, 26, ${.50 + intensity * .46})`;
      lamp.style.background = intensity > .035
        ? `radial-gradient(circle, ${warm} 0 34%, rgba(255, 115, 23, .30) 42%, transparent 50%) 0 0 / 8px 7px, rgba(67, 31, 8, .92)`
        : `radial-gradient(circle, rgba(70,42,18,.68) 0 31%, transparent 38%) 0 0 / 8px 7px, rgba(10,9,6,.88)`;
      lamp.style.boxShadow = intensity > .035
        ? `0 0 ${3 + intensity * 7 + hot * 8}px rgba(255, 143, 27, ${.22 + intensity * .43}), inset 0 0 5px rgba(255, 236, 180, ${.06 + hot * .24})`
        : 'inset 0 0 6px rgba(0,0,0,.9)';
      lamp.style.transform = `scaleX(${1 + impactEnergy * (.012 + index / 12 * .024)})`;
    });

    const frontier = 529 - clamp(fill / 13) * 260;
    const scanMemory = clamp(overload * (1 - brownout) * (1 - smooth(4.30, 4.72, t)) + result * .18 + coolingFlicker * .13);
    [els.scanA, els.scanB, els.scanC].forEach((band, index) => {
      band.style.top = `${frontier + index * 19 + coolingFlicker * (index - 1) * 7}px`;
      band.style.opacity = String(scanMemory * (.50 - index * .12));
    });

    els.towerBrownout.style.opacity = String(brownout * .84);
    els.globalDim.style.opacity = String(brownout * .31);
    els.towerCriticalCore.style.opacity = String(clamp(critical * .90 + criticalAfter * .20 + coolingFlicker * .16) * (1 - brownout));
    const strike = pulse(t - 3.782, .052);
    const burstOpen = smooth(3.748, 3.902, t);
    els.criticalBurst.style.opacity = String(clamp(strike * .98 + critical * .78 + criticalAfter * .10 + coolingFlicker * .11) * (1 - brownout));
    els.criticalBurst.style.transform = `scale(${.24 + burstOpen * 1.04 + critical * .10 + coolingFlicker * .018}) rotate(${-7 + burstOpen * 12 + coolingFlicker * 2.2}deg)`;
    els.criticalStrobe.style.opacity = String(clamp(pulse(t - 3.777, .042) * .78 + pulse(t - 3.812, .035) * .30));
    els.towerBloom.style.opacity = String(clamp(impactEnergy * .15 + overload * .18 + critical * .84 + result * .13) * (1 - brownout));
    els.intakeFlash.style.opacity = String(clamp(impactEnergy * .86 + critical * .72));
    els.intakeFlash.style.transform = `scale(${.62 + impactEnergy * .62 + critical * .60})`;
    els.impactRing.style.opacity = String(clamp(impactEnergy * .70 + critical * .75));
    els.impactRing.style.transform = `scale(${.58 + impactEnergy * 1.0 + critical * 1.15})`;

    els.targetLatch.style.borderColor = targetCross > .02
      ? `rgba(${Math.round(255 - targetCross * 86)}, ${Math.round(165 + targetCross * 67)}, ${Math.round(52 + targetCross * 166)}, .98)`
      : 'rgba(128,70,23,.74)';
    els.targetLatch.style.boxShadow = targetCross > .02
      ? `0 0 ${7 + critical * 16}px rgba(109, 212, 204, ${.28 + critical * .18}), inset 0 0 0 7px rgba(8,9,8,.94)`
      : 'inset 0 0 0 7px rgba(8,9,8,.94)';

    const tear = Math.max(pulse(t - 3.805, .095), pulse(t - 3.965, .075) * .25);
    els.crtTear.style.opacity = String(tear * .90);
    els.crtTear.style.top = `${320 + Math.sin(t * 137) * 13}px`;
    els.crtTear.style.transform = `translateX(${Math.sin(t * 113) * 8}px) scaleX(${.78 + tear * .26})`;

    const localKick = events.reduce((kick, event) => kick + Math.sin((t - event.impact) * 92) * pulse(t - event.impact, .09) * event.weight * 2.4, 0);
    const coolingKick = coolingFlicker * Math.sin(t * 149) * .95;
    els.towerFx.style.transform = `translateX(${localKick + critical * Math.sin(t * 185) * 3.2 + coolingKick}px) scaleX(${1 - brownout * .012 + critical * .012})`;

    [...els.sparkLayer.children].forEach((spark, index) => {
      const local = clamp((t - (3.752 + index * .006)) / .15);
      const fade = local <= 0 ? 0 : (1 - local) * criticalAfter;
      const angle = Number(spark.dataset.angle);
      const distance = local * (17 + index * 3);
      spark.style.opacity = String(clamp(fade * 1.12));
      spark.style.transform = `rotate(${angle}deg) translateX(${distance}px) scaleX(${.48 + fade})`;
    });

    const worldKick = critical * Math.sin(t * 164) * 4.2;
    els.world.style.transform = `translate(${worldKick}px, ${-Math.abs(worldKick) * .30}px)`;
  }

  function renderWave(t) {
    const rollEnergy = envelope(t, .08, .18, 1.12, 1.31) * .16;
    const eventEnergy = events.reduce((energy, event) => energy + envelope(t, event.start, event.rise, event.fall, event.end) * (.08 + event.weight * .13), 0);
    const echoAccent = envelope(t, 1.95, 1.99, 2.20, 2.27) * .18;
    const critical = pulse(t - 3.79, .20) * .55;
    const resultFade = 1 - smooth(4.02, 4.24, t);
    const energy = clamp((.08 + rollEnergy + eventEnergy + echoAccent + critical) * resultFade);
    [...els.terminalWave.children].forEach(dot => {
      const x = Number(dot.dataset.x);
      const y = Number(dot.dataset.y);
      const amplitude = 1.2 + energy * 4.4;
      const echoRipple = echoAccent * Math.sin(x * 1.55 + t * 26) * 1.8;
      const center = 6.5 + Math.sin(x * .68 + t * 12.5) * amplitude * (.34 + .66 * Math.sin(x * .28 + 1.1) ** 2) + echoRipple;
      const distance = Math.abs(y - center);
      const on = clamp(1 - distance / 1.18);
      dot.style.opacity = String(on * (.06 + energy * .46));
      dot.style.transform = `scale(${.78 + on * .28})`;
    });
  }

  function renderHud(t) {
    const score = Math.round(scoreAt(t));
    els.currentValue.textContent = String(score);
    els.targetValue.textContent = String(targetScore);

    let code = '01';
    let action = 'SPACE 投掷';
    let actionOpacity = .96;
    let glow = 1;
    if (t >= .08 && t < 1.20) {
      code = t < .64 ? '02' : '03';
      action = '骰面滚动';
      actionOpacity = .34;
      glow = 0;
    } else if (t >= 1.20 && t < 1.42) {
      code = '04';
      action = '结果锁定 · 自动结算';
      actionOpacity = .44;
      glow = 0;
    } else if (t >= 1.42 && t < 4.08) {
      code = '05';
      action = '结算处理中';
      actionOpacity = .28;
      glow = 0;
    } else if (t >= 4.08) {
      code = '06';
      action = 'SPACE 进入市场';
      actionOpacity = smooth(4.08, 4.24, t) * .96;
      glow = smooth(4.10, 4.28, t);
    }
    els.phaseCode.textContent = code;
    els.actionText.textContent = action;
    els.actionText.style.opacity = String(actionOpacity);
    els.actionGlow.style.borderColor = `rgba(226, 137, 34, ${.22 + glow * .52})`;
    els.actionGlow.style.background = `rgba(119, 60, 11, ${.04 + glow * .16})`;
    els.actionGlow.style.boxShadow = glow > .02 ? `0 0 ${8 + glow * 12}px rgba(255, 156, 28, ${glow * .28}), inset 0 0 8px rgba(255, 205, 97, ${glow * .12})` : 'none';

    const result = smooth(4.07, 4.22, t);
    els.ruleHeading.style.opacity = String((1 - result) * .76);
    els.ruleBody.style.opacity = String((1 - result) * .48);
    els.terminalResult.style.opacity = String(result);
    els.resultWarmth.style.opacity = String(result);
  }

  function renderAt(rawTime) {
    const t = clamp(Number(rawTime) || 0, 0, duration);
    diceData.forEach((data, index) => renderReel(data, index, t));
    events.forEach(event => {
      renderChaser(event, t);
      renderPacket(event, t);
    });
    renderTower(t);
    renderWave(t);
    renderHud(t);
  }

  Promise.all([...document.images].map(img => img.complete ? Promise.resolve() : new Promise(resolve => {
    img.addEventListener('load', resolve, { once: true });
    img.addEventListener('error', resolve, { once: true });
  }))).then(() => {
    window.renderAt = renderAt;
    window.previewDuration = duration;
    window.previewReady = true;
    renderAt(0);
  });
})();
</script>
</body>
</html>
